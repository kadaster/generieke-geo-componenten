name: Create releases

on:
  workflow_dispatch:
    inputs:
      version_bump:
        type: choice
        description: Version bump
        options:
          - patch
          - minor
          - major
      ggc_dataset_tree:
        type: boolean
        description: Release ggc-dataset-tree
        default: false
      ggc_legend:
        type: boolean
        description: Release ggc-legend
        default: false
      ggc_map:
        type: boolean
        description: Release ggc-map
        default: false
      ggc_models:
        type: boolean
        description: Release ggc-models
        default: false
      ggc_search_location:
        type: boolean
        description: Release ggc-search-location
        default: false
      ggc_toolbar:
        type: boolean
        description: Release ggc-toolbar
        default: false

permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  bump_versions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.VERSION_BUMPER_APPID }}
          private-key: ${{ secrets.VERSION_BUMPER_SECRET }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - name: Bump versions
        env:
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}
          GGC_DATASET_TREE: ${{ github.event.inputs.ggc_dataset_tree }}
          GGC_LEGEND: ${{ github.event.inputs.ggc_legend }}
          GGC_MAP: ${{ github.event.inputs.ggc_map }}
          GGC_MODELS: ${{ github.event.inputs.ggc_models }}
          GGC_SEARCH_LOCATION: ${{ github.event.inputs.ggc_search_location }}
          GGC_TOOLBAR: ${{ github.event.inputs.ggc_toolbar }}
        run: |
          set -e

          bump() {
            PROJECT=$1

            echo "📦 Bumping $PROJECT ($VERSION_BUMP)"

            cd "projects/$PROJECT"

            # bump version
            npm version "$VERSION_BUMP" --no-git-tag-version

            cd -
          }

          if [ "$GGC_DATASET_TREE" = "true" ]; then
            bump "ggc-dataset-tree"
          fi

          if [ "$GGC_LEGEND" = "true" ]; then
            bump "ggc-legend"
          fi

          if [ "$GGC_MAP" = "true" ]; then
            bump "ggc-map"
          fi

          if [ "$GGC_MODELS" = "true" ]; then
            bump "ggc-models"
          fi

          if [ "$GGC_SEARCH_LOCATION" = "true" ]; then
            bump "ggc-search-location"
          fi

          if [ "$GGC_TOOLBAR" = "true" ]; then
            bump "ggc-toolbar"
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add projects/**/package.json
          git commit -m "chore: bump package versions (${{ github.event.inputs.version_bump }})" || echo "Nothing to commit"

      - name: Tag versions
        env:
          GGC_DATASET_TREE: ${{ github.event.inputs.ggc_dataset_tree }}
          GGC_LEGEND: ${{ github.event.inputs.ggc_legend }}
          GGC_MAP: ${{ github.event.inputs.ggc_map }}
          GGC_MODELS: ${{ github.event.inputs.ggc_models }}
          GGC_SEARCH_LOCATION: ${{ github.event.inputs.ggc_search_location }}
          GGC_TOOLBAR: ${{ github.event.inputs.ggc_toolbar }}
        run: |
          set -e

          tag() {
            PROJECT=$1

            cd "projects/$PROJECT"

            # read name + version from package.json
            PACKAGE_NAME=$(node -p "require('./package.json').name")
            PACKAGE_VERSION=$(node -p "require('./package.json').version")

            TAG="${PACKAGE_NAME}@${PACKAGE_VERSION}"

            echo "🏷️ Creating tag $TAG"
            git tag "$TAG"

            cd -
          }

          if [ "$GGC_DATASET_TREE" = "true" ]; then
            tag "ggc-dataset-tree"
          fi

          if [ "$GGC_LEGEND" = "true" ]; then
            tag "ggc-legend"
          fi

          if [ "$GGC_MAP" = "true" ]; then
            tag "ggc-map"
          fi

          if [ "$GGC_MODELS" = "true" ]; then
            tag "ggc-models"
          fi

          if [ "$GGC_SEARCH_LOCATION" = "true" ]; then
            tag "ggc-search-location"
          fi

          if [ "$GGC_TOOLBAR" = "true" ]; then
            tag "ggc-toolbar"
          fi

      - name: Push commits and tags
        uses: ad-m/github-push-action@v1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tags: true
          branch: ${{ github.ref }}
      - run: npm run build:all --if-present
      - name: Publish to npm
        env:
          GGC_DATASET_LEGEND: ${{ github.event.inputs.ggc_dataset_legend }}
          GGC_LEGEND: ${{ github.event.inputs.ggc_legend }}
          GGC_MAP: ${{ github.event.inputs.ggc_map }}
          GGC_MODELS: ${{ github.event.inputs.ggc_models }}
          GGC_SEARCH_LOCATION: ${{ github.event.inputs.ggc_search_location }}
          GGC_TOOLBAR: ${{ github.event.inputs.ggc_toolbar }}
        run: |
          set -e

          build_and_publish() {
            PROJECT=$1

            DIST_DIR="dist/$PROJECT"

            if [ ! -d "$DIST_DIR" ]; then
              echo "❌ Dist directory not found: $DIST_DIR"
              exit 1
            fi

            cd "$DIST_DIR"

            PACKAGE_NAME=$(node -p "require('./package.json').name")
            PACKAGE_VERSION=$(node -p "require('./package.json').version")

            echo "📦 Publishing $PACKAGE_NAME@$PACKAGE_VERSION"

            # Check if version already exists on npm
            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              echo "⚠️ $PACKAGE_NAME@$PACKAGE_VERSION already exists on npm. Skipping."
            else
              # workaround voor https://github.com/actions/setup-node/issues/1440
              NODE_AUTH_TOKEN="" npm publish
              echo "✅ Published $PACKAGE_NAME@$PACKAGE_VERSION"
            fi

            cd -
          }

          if [ "$GGC_DATASET_LEGEND" = "true" ]; then
            build_and_publish "ggc-dataset-legend"
          fi

          if [ "$GGC_LEGEND" = "true" ]; then
            build_and_publish "ggc-legend"
          fi

          if [ "$GGC_MAP" = "true" ]; then
            build_and_publish "ggc-map"
          fi

          if [ "$GGC_MODELS" = "true" ]; then
            build_and_publish "ggc-models"
          fi

          if [ "$GGC_SEARCH_LOCATION" = "true" ]; then
            build_and_publish "ggc-search-location"
          fi

          if [ "$GGC_TOOLBAR" = "true" ]; then
            build_and_publish "ggc-toolbar"
          fi
