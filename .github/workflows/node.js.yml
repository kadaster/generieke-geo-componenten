name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  install:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run build:all
      - name: Cache dist
        uses: actions/cache@v5
        with:
          path: dist
          key: dist-${{ github.sha }}

  lint:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        step:
          [
            ggc-cesium,
            ggc-dataset-tree,
            ggc-feature-info,
            ggc-legend,
            ggc-map,
            ggc-models,
            ggc-search-location,
            ggc-toolbar
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run lint:${{ matrix.step }}

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        step:
          [
            ggc-cesium,
            ggc-dataset-tree,
            ggc-feature-info,
            ggc-legend,
            ggc-map,
            ggc-search-location,
            ggc-toolbar
          ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Restore dist
        uses: actions/cache@v5
        with:
          path: dist
          key: dist-${{ github.sha }}
      - run: npm run test:${{ matrix.step }}
