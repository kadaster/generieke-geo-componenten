pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    gzip          on;
    gzip_types    application/javascript application/xml application/xhtml+xml text/css text/javascript text/xml text/html application/json;
    default_type  application/octet-stream;
    sendfile        on;
    server_tokens off;

    keepalive_timeout  65;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    include     /etc/nginx/conf.d/*.conf;
    include       /etc/nginx/mime.types;

    server {
        listen 8080 default_server;

        server_name *.kadaster.nl;

        root /etc/nginx/html;

        rewrite ^/.well-known/security.txt$ https://www.ncsc.nl/.well-known/security.txt permanent;

        location / {
            root /etc/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
            add_header X-Frame-Options "DENY";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header Content-Security-Policy
            "
            default-src 'self' https://geodata.nationaalgeoregister.nl https://api.pdok.nl https://service.pdok.nl *.kadaster.nl;
            script-src 'self' https://cdn.jsdelivr.net 'wasm-unsafe-eval' 'unsafe-eval' 'unsafe-inline';
            script-src-elem 'self' https://cdn.jsdelivr.net;
            connect-src 'self' https://cdn.jsdelivr.net https://api.pdok.nl https://service.pdok.nl *.kadaster.nl https://geodata.nationaalgeoregister.nl;
            font-src 'self' https://cdn.jsdelivr.net data:;
            frame-src 'self';
            object-src 'self';
            style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
            img-src 'self' https://geodata.nationaalgeoregister.nl https://service.pdok.nl https://api.pdok.nl *.kadaster.nl https://*.gstatic.com blob: data:;
            ";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location = /50x.html {
            root /etc/nginx/html;
        }
    }
}
